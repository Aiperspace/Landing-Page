<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">AIPER space</title>
  <!-- Two-line wordmark: tight stack like the primary logo -->
  <text
    x="0"
    y="34"
    fill="#f8fafc"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="32"
    font-weight="700"
    letter-spacing="-0.035em"
  >AIPER</text>
  <g fill="#60a5fa">
    <!-- Small spark, baseline-aligned with “space” -->
