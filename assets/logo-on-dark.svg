      d="M 3 44.5 4.2 47.2 7 47.6 5 49.4 5.4 52.2 3 50.8 0.6 52.2 1 49.4 -1 47.6 1.8 47.2 Z"
    />
    <text
      x="10"
      y="52"
      font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
      font-size="14"
      font-weight="600"
      letter-spacing="0.03em"
    >space</text>
  </g>
